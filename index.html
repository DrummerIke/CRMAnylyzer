<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BORK CRM Filter</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Nunito;
  background:#2f2623;
  color:#fff;
  padding:20px;
}

h2{margin:10px 0;}

button{
  background:linear-gradient(180deg,#ef6f2e,#d85d22);
  border:none;
  border-radius:14px;
  color:#fff;
  padding:10px 14px;
  font-weight:700;
  cursor:pointer;
}

button:hover{opacity:.9}

input,select{
  background:#3a2f2c;
  border:1px solid rgba(255,255,255,.1);
  color:#fff;
  border-radius:10px;
  padding:8px;
}

.condition-row{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  background:rgba(255,255,255,.03);
  padding:8px;
  border-radius:12px;
  margin-bottom:6px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

td,th{
  border:1px solid rgba(255,255,255,.1);
  padding:6px;
  font-size:12px;
}
th{background:#ef6f2e}
</style>
</head>

<body>

<h2>📊 BORK CRM Filter</h2>

<input type="file" id="fileInput">

<hr>

<div id="conditions"></div>
<button onclick="addCondition()">+ Условие</button>

<hr>

<label>Группировка</label>
<select id="groupCol"></select>

<label>Сортировка</label>
<select id="sortCol"></select>

<label>Лимит</label>
<input type="number" id="limit" value="100">

<button onclick="applyFilters()">🔍 Применить</button>

<button onclick="saveFilters()">💾 Сохранить фильтр</button>
<button onclick="loadFilters()">📂 Загрузить</button>

<hr>

<button onclick="smsExport()">📲 SMS база</button>
<button onclick="autoDistribute()">⚡ Автораспределение</button>

<div id="limits"></div>

<div id="preview"></div>

<script>
let data = [];
let columns = [];
let result = [];


// ================= LOAD =================
fileInput.onchange = async (e)=>{
  const file = e.target.files[0];
  const buffer = await file.arrayBuffer();

  let json;

  if(file.name.endsWith('.xlsx')){
    const wb = XLSX.read(buffer,{type:'array'});
    json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  } else {
    const text = new TextDecoder().decode(buffer);
    const wb = XLSX.read(text,{type:'string'});
    json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  }

  data = json;
  columns = Object.keys(json[0]||{});

  fillSelects();
  addCondition();
};


// ================= UI =================
function fillSelects(){
  groupCol.innerHTML =
  sortCol.innerHTML =
  columns.map(c=>`<option>${c}</option>`).join('');
}

function addCondition(){
  const div=document.createElement('div');
  div.className='condition-row';

  div.innerHTML=`
    <select class="col"></select>
    <select class="op">
      <option>=</option>
      <option>!=</option>
      <option>></option>
      <option><</option>
      <option value="contains">contains</option>
    </select>
    <input class="val">
    <button onclick="this.parentElement.remove()">x</button>
  `;

  conditions.appendChild(div);

  updateCols();
}

function updateCols(){
  document.querySelectorAll('.col').forEach(s=>{
    s.innerHTML=columns.map(c=>`<option>${c}</option>`).join('');
  });
}


// ================= FILTER =================
function applyFilters(){

  let conds=[];

  document.querySelectorAll('.condition-row').forEach(r=>{
    const c=r.querySelector('.col').value;
    const o=r.querySelector('.op').value;
    const v=r.querySelector('.val').value;

    if(!c||!v)return;

    conds.push({c,o,v});
  });

  result = data.filter(row=>{
    return conds.every(f=>{
      const val = row[f.c];

      if(f.o==="contains")
        return String(val).toLowerCase().includes(f.v.toLowerCase());

      if(f.o===">")
        return Number(val)>Number(f.v);

      if(f.o==="<")
        return Number(val)<Number(f.v);

      if(f.o==="!=")
        return val!=f.v;

      return val==f.v;
    });
  });

  render(result);
  buildLimits(result);
}


// ================= RENDER =================
function render(rows){

  if(!rows.length)return;

  const keys=Object.keys(rows[0]);

  let html="<table><tr>"+keys.map(k=>`<th>${k}</th>`).join("")+"</tr>";

  rows.slice(0,100).forEach(r=>{
    html+="<tr>"+keys.map(k=>`<td>${r[k]??""}</td>`).join("")+"</tr>";
  });

  html+="</table>";

  preview.innerHTML=html;
}


// ================= LIMITS =================
function buildLimits(rows){

  const col = groupCol.value;
  let map={};

  rows.forEach(r=>{
    const k=r[col];
    map[k]=(map[k]||0)+1;
  });

  limits.innerHTML =
    Object.entries(map).map(([k,v])=>
      `${k} (${v}) <input data-k="${k}" type="number" value="${v}"><br>`
    ).join('');
}


// ================= AUTO DISTRIBUTE =================
function autoDistribute(){

  const col = groupCol.value;

  let limits={};
  document.querySelectorAll('#limits input').forEach(i=>{
    limits[i.dataset.k]=+i.value;
  });

  let counters={};
  let managers=Object.keys(limits);
  managers.forEach(m=>counters[m]=0);

  let res=[];
  let i=0;

  result.forEach(r=>{

    let tries=0;

    while(tries<managers.length){
      let m=managers[i];

      if(counters[m]<limits[m]){
        let nr={...r};
        nr[col]=m;

        res.push(nr);
        counters[m]++;

        i=(i+1)%managers.length;
        break;
      }

      i=(i+1)%managers.length;
      tries++;
    }

  });

  result=res;
  render(res);
}


// ================= SMS =================
function smsExport(){

  const col = groupCol.value;

  const nums=result
    .map(r=>String(r[col]).replace(/\D/g,''))
    .filter(v=>v.length>9);

  const blob=new Blob([nums.join("\n")]);
  const a=document.createElement("a");

  a.href=URL.createObjectURL(blob);
  a.download="sms.txt";
  a.click();
}


// ================= SAVE / LOAD =================
function saveFilters(){

  let f=[];

  document.querySelectorAll('.condition-row').forEach(r=>{
    f.push({
      c:r.querySelector('.col').value,
      o:r.querySelector('.op').value,
      v:r.querySelector('.val').value
    });
  });

  localStorage.setItem("filters",JSON.stringify(f));
}

function loadFilters(){

  let f=JSON.parse(localStorage.getItem("filters")||"[]");

  conditions.innerHTML="";

  f.forEach(x=>{
    addCondition();
    let r=document.querySelectorAll('.condition-row');
    let last=r[r.length-1];

    last.querySelector('.col').value=x.c;
    last.querySelector('.op').value=x.o;
    last.querySelector('.val').value=x.v;
  });
}

</script>

</body>
</html>
