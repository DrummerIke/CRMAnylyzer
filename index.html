<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Операционный центр</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family: sans-serif;
  background:#2b2422;
  color:#fff;
  padding:20px;
}
.card{
  background:#3a312e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}
button{
  padding:10px 14px;
  background:#ef6f2e;
  border:none;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}
input,select{
  padding:8px;
  border-radius:6px;
  border:none;
}
.table{
  width:100%;
  margin-top:10px;
}
.table td{
  padding:6px;
}
</style>
</head>

<body>

<h2>Операционный центр отбора</h2>

<div class="card">
<input type="file" id="file">
<div id="status"></div>
</div>

<div class="card">
<h3>Сегменты</h3>
<div id="segments"></div>
</div>

<div class="card">
<h3>Фильтр</h3>
<select id="field"></select>
<select id="op">
<option value=">">></option>
<option value="<"><</option>
<option value="=">=</option>
<option value="contains">содержит</option>
</select>
<input id="value">
<button onclick="applyFilter()">Применить</button>
</div>

<div class="card">
<h3>Сотрудники</h3>
<input type="number" id="limit" value="100">
<button onclick="calculate()">Посчитать</button>
<table class="table" id="staff"></table>
</div>

<div class="card">
<button onclick="exportPhones()">Скачать номера</button>
</div>

<script>
let data = []
let filtered = []
let segments = new Set()

document.getElementById('file').onchange = async e=>{
  const file = e.target.files[0]
  const reader = new FileReader()

  reader.onload = evt=>{
    const wb = XLSX.read(evt.target.result,{type:'binary'})
    data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]])

    // нормализация
    data.forEach(r=>{
      if(r['Дата']){
        const d = new Date(r['Дата'])
        if(!isNaN(d)) r['Дата'] =
          String(d.getDate()).padStart(2,'0')+'.'+
          String(d.getMonth()+1).padStart(2,'0')+'.'+
          d.getFullYear()
      }
      if(r['Общ_сумма']){
        r['Общ_сумма'] = parseFloat(r['Общ_сумма'])||0
      }
      segments.add(r['Категория'])
    })

    renderSegments()
    renderFields()

    document.getElementById('status').innerText="Файл загружен"
  }

  reader.readAsBinaryString(file)
}

function renderSegments(){
  const el = document.getElementById('segments')
  const arr = Array.from(segments)

  arr.sort((a,b)=>{
    if(a.startsWith('VIC')) return -1
    if(b.startsWith('VIC')) return 1
    return a.localeCompare(b)
  })

  el.innerHTML = arr.map(s=>
    `<label><input type="checkbox" value="${s}" checked> ${s}</label><br>`
  ).join('')
}

function renderFields(){
  const f = document.getElementById('field')
  f.innerHTML = Object.keys(data[0])
    .map(c=>`<option>${c}</option>`).join('')
}

function applyFilter(){
  const field = document.getElementById('field').value
  const op = document.getElementById('op').value
  const val = document.getElementById('value').value

  const selectedSegments = Array.from(
    document.querySelectorAll('#segments input:checked')
  ).map(i=>i.value)

  filtered = data.filter(r=>{
    if(!selectedSegments.includes(r['Категория'])) return false

    if(!val) return true

    if(op==='>') return r[field] > val
    if(op==='<') return r[field] < val
    if(op==='=') return r[field] == val
    if(op==='contains') return String(r[field]).includes(val)

    return true
  })

  alert("Найдено: "+filtered.length)
}

function calculate(){
  const limit = parseInt(document.getElementById('limit').value)

  const map = {}

  filtered.forEach(r=>{
    const s = r['Сотрудник']
    if(!map[s]) map[s]=[]
    map[s].push(r)
  })

  let html = ''

  Object.keys(map).forEach(s=>{
    const total = map[s].length
    const take = Math.min(limit,total)

    html += `
    <tr>
      <td>${s}</td>
      <td>${total}</td>
      <td><input type="number" value="${take}" data-name="${s}"></td>
    </tr>`
  })

  document.getElementById('staff').innerHTML = html
}

function exportPhones(){
  const inputs = document.querySelectorAll('#staff input')

  let result = []

  inputs.forEach(inp=>{
    const name = inp.dataset.name
    const limit = parseInt(inp.value)

    const rows = filtered
      .filter(r=>r['Сотрудник']===name)
      .slice(0,limit)

    rows.forEach(r=>{
      if(r['Телефон']) result.push(r['Телефон'])
    })
  })

  const blob = new Blob([result.join('\n')])
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'phones.txt'
  a.click()
}
</script>

</body>
</html>
