<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Compas Operation Center</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#2f2623;
  color:#fff;
  padding:16px;
}

h2{margin:10px 0;}

.panel{
  background:rgba(255,255,255,0.04);
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

button{
  background:#ef6f2e;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  margin-top:6px;
}

input,select{
  background:#3a2f2b;
  border:1px solid #444;
  color:#fff;
  padding:6px;
  border-radius:8px;
}

label{
  font-size:12px;
  display:block;
  margin:2px 0;
}

.checkbox-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

td,th{
  border:1px solid #444;
  padding:4px;
}

th{
  background:#ef6f2e;
  position:sticky;
  top:0;
}
</style>
</head>

<body>

<h2>⚙️ COMPAS OPERATION CENTER</h2>

<div class="panel">
<input type="file" id="fileInput">
</div>

<!-- SEGMENTS -->
<div class="panel">
<h3>📊 Сегменты</h3>
<div id="segments"></div>
<button onclick="applyFilters()">Применить фильтр</button>
</div>

<!-- FILTERS -->
<div class="panel">
<h3>🔎 Условия</h3>

<label>Дата последнего контакта (до)</label>
<input type="date" id="dateLimit">

<label>Минимальный оборот</label>
<input type="number" id="turnoverMin" value="0">
</div>

<!-- STAFF -->
<div class="panel">
<h3>👥 Распределение</h3>
<div id="staff"></div>
<button onclick="distribute()">⚡ Распределить задачи</button>
</div>

<!-- EXPORT -->
<div class="panel">
<h3>📲 Compas экспорт</h3>
<button onclick="exportPhones()">Скачать TXT</button>
</div>

<div id="preview"></div>

<script>

let data = [];
let filtered = [];

let PHONE_FIELD = null;
let EMP_FIELD = null;
let SEG_FIELD = null;

// ================= SEGMENTS =================
const SEGMENTS = [
"Искра_Активные","Искра_Спящие","Искра_Ушедшие","Искра_Корпоративные",
"Новички_Активные","Новички_Спящие","Новички_Ушедшие","Новички_Корпоративные",
"Знакомые_Активные","Знакомые_Спящие","Знакомые_Ушедшие","Знакомые_Корпоративные",
"Друзья_Активные","Друзья_Спящие","Друзья_Ушедшие","Друзья_Корпоративные",
"Семья_Активные","Семья_Спящие","Семья_Ушедшие","Семья_Корпоративные",
"VIC_Активные","VIC_Спящие","VIC_Ушедшие","VIC_Корпоративные"
];

// ================= LOAD =================
fileInput.onchange = async (e)=>{

  const file = e.target.files[0];
  const buf = await file.arrayBuffer();

  const wb = XLSX.read(buf,{type:'array'});
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  data = json;

  const keys = Object.keys(data[0] || {});

  PHONE_FIELD = keys.find(k => k.toLowerCase().includes("тел"));
  EMP_FIELD = keys.find(k => k.toLowerCase().includes("сотрудник"));
  SEG_FIELD = keys.find(k => k.toLowerCase().includes("сегмент"));

  buildSegments();
  buildStaff();

  render(data);
};

// ================= SEGMENTS UI =================
function buildSegments(){
  segments.innerHTML = SEGMENTS.map(s=>`
    <label>
      <input type="checkbox" value="${s}">
      ${s}
    </label>
  `).join('');
}

// ================= STAFF =================
function buildStaff(){

  if(!EMP_FIELD) return;

  let map = {};

  data.forEach(r=>{
    let s = r[EMP_FIELD] || "—";
    map[s] = (map[s] || 0) + 1;
  });

  staff.innerHTML = Object.entries(map).map(([k,v])=>`
    <label>
      ${k} (${v})
      <input type="number" value="${v}" data-s="${k}">
    </label>
  `).join('');
}

// ================= FILTER =================
function applyFilters(){

  const selected = [...document.querySelectorAll('#segments input:checked')]
    .map(i=>i.value);

  const dateLimit = document.getElementById("dateLimit").value;
  const turnoverMin = +document.getElementById("turnoverMin").value || 0;

  filtered = data.filter(r=>{

    // SEGMENT
    if(selected.length && !selected.includes(r[SEG_FIELD])){
      return false;
    }

    // DATE FILTER
    if(dateLimit && r["Дата последнего контакта"]){
      const d = new Date(r["Дата последнего контакта"].split(".").reverse().join("-"));
      if(d > new Date(dateLimit)) return false;
    }

    // TURNOVER
    if(r["Оборот"] && +r["Оборот"] < turnoverMin){
      return false;
    }

    return true;
  });

  render(filtered);
}

// ================= DISTRIBUTE =================
function distribute(){

  const inputs = document.querySelectorAll('#staff input');

  let limits = {};
  inputs.forEach(i=>{
    limits[i.dataset.s] = +i.value;
  });

  let counters = {};
  Object.keys(limits).forEach(s=>counters[s]=0);

  const staff = Object.keys(limits);

  // приоритет: старые контакты первыми
  const sorted = [...filtered].sort((a,b)=>{
    const da = new Date((a["Дата последнего контакта"]||"01.01.2000").split(".").reverse().join("-"));
    const db = new Date((b["Дата последнего контакта"]||"01.01.2000").split(".").reverse().join("-"));
    return da - db;
  });

  let i = 0;

  for(let r of sorted){

    let tries = 0;

    while(tries < staff.length){

      let s = staff[i];

      if(counters[s] < limits[s]){
        r[EMP_FIELD] = s;
        counters[s]++;
        i = (i+1) % staff.length;
        break;
      }

      i = (i+1) % staff.length;
      tries++;
    }
  }

  filtered = sorted;
  render(filtered);
}

// ================= EXPORT =================
function exportPhones(){

  const phones = filtered
    .map(r => String(r[PHONE_FIELD] || "").replace(/\D/g,''))
    .filter(v => v.length >= 10);

  const unique = [...new Set(phones)];

  if(!unique.length){
    alert("Нет номеров для выгрузки");
    return;
  }

  const blob = new Blob([unique.join("\n")], {type:"text/plain"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "compas_phones.txt";
  a.click();
}

// ================= RENDER =================
function render(rows){

  if(!rows.length){
    preview.innerHTML = "<p>Нет данных</p>";
    return;
  }

  const keys = Object.keys(rows[0]);

  let html = "<table><tr>" + keys.map(k=>`<th>${k}</th>`).join("") + "</tr>";

  rows.slice(0,100).forEach(r=>{
    html += "<tr>" + keys.map(k=>`<td>${r[k] ?? ""}</td>`).join("") + "</tr>";
  });

  html += "</table>";

  preview.innerHTML = html;
}

</script>

</body>
</html>
