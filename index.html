<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BORK Data Tool</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; background:#2f2a28; color:#fff; padding:20px;}
button{padding:10px;margin:5px;cursor:pointer;}
input,select{padding:8px;margin:5px;}
.condition-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
table{width:100%;margin-top:10px;border-collapse:collapse;}
td,th{border:1px solid #555;padding:5px;}
</style>
</head>

<body>

<h2>Фильтр базы</h2>

<input type="file" id="fileInput">

<div id="conditions"></div>
<button id="addCondition">+ Условие</button>

<br>

<select id="groupCol"></select>
<select id="sortCol"></select>

<input type="number" id="nLimit" value="100">

<select id="orderType">
<option value="top">TOP</option>
<option value="bottom">BOTTOM</option>
</select>

<br>

<button id="applyBtn">Применить</button>
<button id="saveFilters">Сохранить</button>
<button id="loadFilters">Загрузить</button>

<br>

<button id="smsBtn">SMS база</button>
<button id="autoDistributeBtn">Распределить</button>

<div id="preview"></div>
<div id="employeeLimits"></div>

<script type="module">

import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.28.0/dist/duckdb-browser-async.mjs';

let db, conn;
let columns=[];
let resultTable=null;

// INIT
(async ()=>{
 const bundle = await duckdb.selectBundle(duckdb.getJsDelivrBundles());
 const worker = new Worker(bundle.mainWorker);
 db = new duckdb.AsyncDuckDB(new duckdb.ConsoleLogger(), worker);
 await db.instantiate(bundle.mainModule, bundle.pthreadWorker);
 conn = await db.connect();
})();

// LOAD FILE
fileInput.onchange = async (e)=>{
 const file=e.target.files[0];
 const buffer=new Uint8Array(await file.arrayBuffer());
 await db.registerFileBuffer(file.name, buffer);

 if(file.name.endsWith('.csv')){
  await conn.query(`CREATE TABLE data AS SELECT * FROM read_csv_auto('${file.name}',sample_size=-1)`);
 }else{
  await conn.query(`CREATE TABLE data AS SELECT * FROM read_xlsx('${file.name}')`);
 }

 const meta = await conn.query("SELECT column_name FROM information_schema.columns WHERE table_name='data'");
 columns = meta.toArray().map(r=>r.column_name);

 fillSelects();
 addCondition();
};

// SELECTS
function fillSelects(){
 ['groupCol','sortCol'].forEach(id=>{
  const el=document.getElementById(id);
  el.innerHTML=columns.map(c=>`<option>${c}</option>`).join('');
 });
}

// CONDITIONS
function addCondition(){
 const row=document.createElement('div');
 row.className='condition-row';

 row.innerHTML=`
 <select class="col-select"></select>
 <select class="op-select">
 <option value="=">=</option>
 <option value="!=">≠</option>
 <option value=">">></option>
 <option value="<"><</option>
 <option value="contains">Содержит</option>
 </select>
 <input class="val-input">
 <button class="remove">x</button>
 `;

 document.getElementById('conditions').appendChild(row);

 row.querySelector('.remove').onclick=()=>row.remove();

 updateCols();
}

addConditionBtn.onclick=addCondition;

function updateCols(){
 document.querySelectorAll('.col-select').forEach(s=>{
  s.innerHTML=columns.map(c=>`<option>${c}</option>`).join('');
 });
}

// APPLY
applyBtn.onclick = async ()=>{
 let where=[];

 document.querySelectorAll('.condition-row').forEach(r=>{
  const c=r.querySelector('.col-select').value;
  const o=r.querySelector('.op-select').value;
  const v=r.querySelector('.val-input').value;

  if(!c||!v)return;

  if(o==='contains'){
   where.push(`CAST("${c}" AS VARCHAR) ILIKE '%${v}%'`);
  }else{
   where.push(`CAST("${c}" AS VARCHAR) ${o} '${v}'`);
  }
 });

 const sql=`SELECT * FROM data ${where.length?'WHERE '+where.join(' AND '):''}`;
 const res=await conn.query(sql);

 resultTable=res;

 render(res.toArray());
};

// RENDER
function render(rows){
 if(!rows.length)return;

 let keys=Object.keys(rows[0]);
 let html='<table><tr>';

 keys.forEach(k=>html+=`<th>${k}</th>`);
 html+='</tr>';

 rows.slice(0,100).forEach(r=>{
  html+='<tr>';
  keys.forEach(k=>html+=`<td>${r[k]}</td>`);
  html+='</tr>';
 });

 html+='</table>';

 preview.innerHTML=html;

 buildEmployeeLimits(rows);
}

// LIMITS
function buildEmployeeLimits(rows){
 const group=groupCol.value;
 let map={};

 rows.forEach(r=>{
  const k=r[group];
  map[k]=(map[k]||0)+1;
 });

 let html='';

 Object.entries(map).forEach(([k,v])=>{
  html+=`${k} (${v}) <input type="number" value="${v}" data-name="${k}" class="emp-limit"><br>`;
 });

 employeeLimits.innerHTML=html;
}

// AUTO DISTRIBUTE
autoDistributeBtn.onclick = ()=>{
 const rows=resultTable.toArray();
 const group=groupCol.value;

 let limits={};
 document.querySelectorAll('.emp-limit').forEach(i=>{
  limits[i.dataset.name]=parseInt(i.value);
 });

 let managers=Object.keys(limits);
 let counters={};
 managers.forEach(m=>counters[m]=0);

 let result=[];
 let i=0;

 rows.forEach(r=>{
  let tries=0;

  while(tries<managers.length){
   let m=managers[i];

   if(counters[m]<limits[m]){
    let newRow={...r};
    newRow[group]=m;
    result.push(newRow);
    counters[m]++;
    i=(i+1)%managers.length;
    break;
   }

   i=(i+1)%managers.length;
   tries++;
  }
 });

 render(result);

 resultTable={
  toArray:()=>result,
  getChild:(col)=>({toArray:()=>result.map(r=>r[col])})
 };
};

// SMS
smsBtn.onclick=()=>{
 const col=groupCol.value;

 const nums=resultTable.getChild(col).toArray()
 .map(v=>String(v).replace(/\D/g,''))
 .filter(v=>v.length>9);

 const blob=new Blob([nums.join('\n')]);
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='sms.txt';
 a.click();
};

// SAVE
saveFilters.onclick=()=>{
 let arr=[];
 document.querySelectorAll('.condition-row').forEach(r=>{
  arr.push({
   c:r.querySelector('.col-select').value,
   o:r.querySelector('.op-select').value,
   v:r.querySelector('.val-input').value
  });
 });
 localStorage.setItem('filters',JSON.stringify(arr));
};

// LOAD
loadFilters.onclick=()=>{
 let arr=JSON.parse(localStorage.getItem('filters')||'[]');
 conditions.innerHTML='';
 arr.forEach(f=>{
  addCondition();
  let rows=document.querySelectorAll('.condition-row');
  let last=rows[rows.length-1];

  last.querySelector('.col-select').value=f.c;
  last.querySelector('.op-select').value=f.o;
  last.querySelector('.val-input').value=f.v;
 });
};

</script>

</body>
</html>
