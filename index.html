<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Отбор базы клиентов</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#2f2623;color:#fff;padding:16px;}
.block{background:#3a2f2b;padding:12px;border-radius:12px;margin-bottom:12px;}
button{background:#ef6f2e;border:none;padding:10px;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;width:100%;}
input,select{padding:6px;border-radius:8px;border:1px solid #444;background:#2f2623;color:#fff;width:100%;}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px;}
td,th{border:1px solid #444;padding:4px;}
th{background:#ef6f2e;}
</style>
</head>

<body>

<h2>📊 Отбор базы клиентов</h2>

<div class="block">
<input type="file" id="fileInput">
</div>

<div class="block">
<h3>1. Сегменты</h3>
<label><input type="checkbox" id="allSeg"> Все</label>
<div id="segments"></div>
</div>

<div class="block">
<h3>2. Фильтр</h3>
<div id="filters"></div>
<button onclick="addFilter()">+ добавить условие</button>
</div>

<div class="block">
<h3>3. Приоритет отбора</h3>

<label>Основной критерий</label>
<select id="mainSort"></select>

<select id="mainDir">
<option value="desc">Сначала большие</option>
<option value="asc">Сначала маленькие</option>
</select>

<label style="margin-top:10px;">Дополнительный критерий</label>
<select id="secondSort"></select>

<select id="secondDir">
<option value="desc">Сначала большие</option>
<option value="asc">Сначала маленькие</option>
</select>

</div>

<div class="block">
<h3>4. Квоты сотрудников</h3>
<div id="staff"></div>
</div>

<button onclick="run()">🚀 Собрать базу для задач</button>

<div id="summary" class="block"></div>
<div id="preview"></div>

<script>

let data=[],result=[];
let SEG,EMP,PHONE,columns=[];

// LOAD
fileInput.onchange=async(e)=>{
const f=e.target.files[0];
const buf=await f.arrayBuffer();
const wb=XLSX.read(buf,{type:'array'});
data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

columns=Object.keys(data[0]);

SEG=columns.find(c=>c.toLowerCase().includes("сег"));
EMP=columns.find(c=>c.toLowerCase().includes("сотруд"));
PHONE=columns.find(c=>c.toLowerCase().includes("тел"));

buildSegments();
buildStaff();

mainSort.innerHTML=columns.map(c=>`<option>${c}</option>`).join('');
secondSort.innerHTML=mainSort.innerHTML;
};

// SEGMENTS
function buildSegments(){
let segs=[...new Set(data.map(r=>r[SEG]).filter(Boolean))];
segments.innerHTML=segs.map(s=>`<label><input type="checkbox" value="${s}">${s}</label>`).join('');
}

// FILTER
function addFilter(){
filters.innerHTML+=`
<div>
<select class="f_col">${columns.map(c=>`<option>${c}</option>`).join('')}</select>
<select class="f_op">
<option value="contains">содержит</option>
<option value="eq">=</option>
<option value="gte">≥</option>
<option value="lte">≤</option>
</select>
<input class="f_val">
</div>`;
}

// STAFF
function buildStaff(){
let map={};
data.forEach(r=>{
let s=r[EMP]||"—";
map[s]=(map[s]||0)+1;
});
staff.innerHTML=Object.entries(map).map(([k,v])=>`
<div>${k} (${v}) <input type="number" value="50" data-s="${k}"></div>
`).join('');
}

// MATCH
function match(r){

if(!allSeg.checked){
let sel=[...document.querySelectorAll('#segments input:checked')].map(i=>i.value);
if(sel.length && !sel.includes(r[SEG])) return false;
}

for(let f of document.querySelectorAll('#filters > div')){
let col=f.querySelector('.f_col').value;
let op=f.querySelector('.f_op').value;
let val=f.querySelector('.f_val').value;
let v=r[col];

if(op==="contains" && !String(v).toLowerCase().includes(val.toLowerCase())) return false;
if(op==="eq" && v!=val) return false;
if(op==="gte" && +v<+val) return false;
if(op==="lte" && +v>+val) return false;
}

return true;
}

// RUN
function run(){

let filtered=data.filter(match);

// SORT
let mCol=mainSort.value;
let mDir=mainDir.value;
let sCol=secondSort.value;
let sDir=secondDir.value;

filtered.sort((a,b)=>{

let v1=+a[mCol]||0;
let v2=+b[mCol]||0;

if(v1!==v2) return mDir==="desc"?v2-v1:v1-v2;

let s1=+a[sCol]||0;
let s2=+b[sCol]||0;

return sDir==="desc"?s2-s1:s1-s2;
});

// QUOTA
let quotas={};
document.querySelectorAll('#staff input').forEach(i=>{
quotas[i.dataset.s]=+i.value;
});

let counters={};
Object.keys(quotas).forEach(s=>counters[s]=0);

result=[];

for(let r of filtered){
for(let s in quotas){
if(counters[s]<quotas[s]){
result.push({...r,[EMP]:s});
counters[s]++;
break;
}
}
}

// SUMMARY
summary.innerHTML=`
<b>Всего:</b> ${result.length}<br>
${Object.entries(counters).map(([k,v])=>`${k}: ${v}`).join("<br>")}
`;

// PREVIEW
render(result);
}

// RENDER
function render(rows){

if(!rows.length){
preview.innerHTML="Нет данных";
return;
}

let keys=Object.keys(rows[0]);

let html="<table><tr>"+keys.map(k=>`<th>${k}</th>`).join("")+"</tr>";

rows.slice(0,50).forEach(r=>{
html+="<tr>"+keys.map(k=>`<td>${r[k]||""}</td>`).join("")+"</tr>";
});

html+="</table>";

preview.innerHTML=html;
}

</script>

</body>
</html>
