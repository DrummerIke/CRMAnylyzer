<script>
(function() {
'use strict';

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

const state = {
  rawData: [],
  columns: [],
  segmentField: 'Категория',
  employeeField: 'Сотрудник',
  phoneField: '',
  selectedSegments: new Set(),
  candidateRows: [],
  finalRows: [],
  employees: [],
  cap: 100
};

// ===== УЛУЧШЕННЫЙ ПОИСК ПОЛЕЙ =====
function findPhoneField(cols) {
  const variants = ['телефон','phone','mobile','моб','тел'];
  return cols.find(c => {
    const norm = c.toLowerCase().replace(/\s/g,'');
    return variants.some(v => norm.includes(v));
  });
}

// ===== PARSE FILE =====
window.handleFile = function(file) {
  const reader = new FileReader();

  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const data = XLSX.utils.sheet_to_json(sheet, { defval: '' });

    state.rawData = data;
    state.columns = Object.keys(data[0] || {});

    state.phoneField = findPhoneField(state.columns);

    if (!state.phoneField) {
      alert('❌ Не найдено поле телефона');
      return;
    }

    initAfterLoad();
  };

  reader.readAsArrayBuffer(file);
};

// ===== ПОСЛЕ ЗАГРУЗКИ =====
function initAfterLoad() {
  buildSegments();

  // включаем табы
  $$('.tab').forEach(t => {
    t.classList.remove('disabled');
    t.onclick = () => switchTab(t.dataset.tab);
  });
}

// ===== ТАБЫ =====
function switchTab(name) {
  $$('.tab').forEach(t => t.classList.remove('active'));
  $$('.panel').forEach(p => p.classList.remove('active'));

  $(`.tab[data-tab="${name}"]`).classList.add('active');
  $(`#panel-${name}`).classList.add('active');
}

// ===== СЕГМЕНТЫ =====
function buildSegments() {
  const map = new Map();

  state.rawData.forEach(r => {
    const v = r[state.segmentField] || '—';
    map.set(v, (map.get(v) || 0) + 1);
  });

  state.selectedSegments = new Set([...map.keys()]);

  const sorted = [...map.entries()].sort((a,b)=>a[0].localeCompare(b[0],'ru'));

  $('#segmentGroups').innerHTML = sorted.map(([val,count])=>`
    <div class="segment-item active" data-val="${val}">
      ${val} (${count})
    </div>
  `).join('');

  $$('.segment-item').forEach(el=>{
    el.onclick = ()=>{
      el.classList.toggle('active');
      state.selectedSegments.has(el.dataset.val)
        ? state.selectedSegments.delete(el.dataset.val)
        : state.selectedSegments.add(el.dataset.val);
    };
  });
}

// ===== ФИЛЬТРЫ (ТИПЫ) =====
function detectType(val) {
  if (!val) return 'text';

  if (!isNaN(Date.parse(val))) return 'date';
  if (!isNaN(parseFloat(val))) return 'number';

  return 'text';
}

function applyFilters() {
  state.candidateRows = state.rawData.filter(r=>{
    if (!state.selectedSegments.has(r[state.segmentField])) return false;

    // тут можно расширять условия
    return true;
  });

  buildEmployees();
  updateSummary();
}

// ===== СОТРУДНИКИ =====
function buildEmployees() {
  const map = new Map();

  state.candidateRows.forEach(r=>{
    const emp = r[state.employeeField] || '—';
    map.set(emp, (map.get(emp)||0)+1);
  });

  state.employees = [...map.entries()].map(([name,count])=>({
    name,
    found: count,
    quota: Math.min(count, state.cap),
    excluded: false
  }));

  renderEmployees();
}

function renderEmployees() {
  $('#employeeList').innerHTML = state.employees.map((e,i)=>`
    <div>
      ${e.name} — найдено ${e.found}
      <input type="number" value="${e.quota}" data-i="${i}">
    </div>
  `).join('');
}

// ===== SUMMARY =====
function updateSummary() {
  $('#metricTotal').textContent = state.rawData.length;
  $('#metricSegments').textContent = state.selectedSegments.size;
  $('#metricFilters').textContent = state.candidateRows.length;
}

// ===== INIT =====
$('#fileInput').onchange = e=>{
  if (e.target.files[0]) handleFile(e.target.files[0]);
};

})();
</script>
