<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Compas Flow • Campaign Builder</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="apple-touch-icon" href="./logo.png">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --font-main: 'Inter', system-ui, 'Helvetica Neue', sans-serif;
      --bg-pulse: #382f2c;
      --bg-card: #282220;
      --bg-card-accent: #1f1a19;
      --bg-input: #1f1a19;
      --bg-dropdown: #181514;
      --bg-modal: #1a1514;
      --border-default: rgba(255,255,255,0.08);
      --border-focus: #f37021;
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #876f67;
      --text-accent: #f37021;
      --text-error: #f54b4b;
      --btn-primary-bg: transparent;
      --btn-primary-border: #f37021;
      --btn-primary-text: #fff;
      --btn-primary-hover-bg: rgba(243,112,33,0.3);
      --btn-primary-disabled-text: #8d6854;
      --btn-primary-disabled-border: #704229;
      --btn-secondary-bg: transparent;
      --btn-secondary-border: #746762;
      --btn-secondary-text: #fff;
      --btn-secondary-hover-bg: rgba(255,255,255,0.1);
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-full: 999px;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.25);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.4);
      --shadow-glow: 0 0 20px rgba(243,112,33,0.15);
      --shadow-modal: 0 20px 60px rgba(0,0,0,0.7);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --emp-color-1: #f37021;
      --emp-color-2: #d95c22;
      --emp-color-3: #8d5a4a;
      --emp-color-4: #f3a86b;
      --emp-color-5: #5a3d36;
      --emp-color-6: #ff8a4a;
      /* Скроллбар */
      --scrollbar-track: rgba(255,255,255,0.03);
      --scrollbar-thumb: rgba(255,255,255,0.12);
      --scrollbar-thumb-hover: rgba(255,255,255,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-main);
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-pulse);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Стилизованные скроллбары */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
    * { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track); }

    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-1 { gap: 4px; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .hidden { display: none !important; }
    .w-full { width: 100%; }
    .text-xs { font-size: 12px; font-weight: 600; }
    .text-sm { font-size: 14px; }
    .text-lg { font-size: 18px; font-weight: 600; }
    .text-muted { color: var(--text-muted); }
    .text-secondary { color: var(--text-secondary); }
    .font-medium { font-weight: 500; }
    .font-semibold { font-weight: 600; }
    .font-bold { font-weight: 700; }

    .header {
      position: sticky; top: 0; z-index: 50;
      height: 56px;
      background: rgba(56,47,44,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-default);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 18px; letter-spacing: -0.3px;
    }
    .logo-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--text-accent);
      box-shadow: 0 0 0 4px rgba(243,112,33,0.2);
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px; padding: 10px 18px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      color: var(--btn-primary-text);
      background: var(--btn-primary-bg);
      border: 1px solid var(--btn-primary-border);
      border-radius: var(--radius-full);
      cursor: pointer; transition: all var(--transition);
    }
    .btn:hover { background: var(--btn-primary-hover-bg); box-shadow: var(--shadow-glow); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled {
      opacity: 0.5; cursor: not-allowed;
      color: var(--btn-primary-disabled-text);
      border-color: var(--btn-primary-disabled-border);
    }
    .btn-secondary {
      background: var(--btn-secondary-bg);
      border: 1px solid var(--btn-secondary-border);
      color: var(--btn-secondary-text);
    }
    .btn-secondary:hover { background: var(--btn-secondary-hover-bg); }
    .btn-ghost {
      background: transparent; border: none;
      color: var(--text-secondary); padding: 6px 10px;
      font-weight: 600; font-size: 13px;
      cursor: pointer; border-radius: var(--radius-sm);
      transition: all var(--transition);
    }
    .btn-ghost:hover { color: var(--text-primary); background: var(--btn-secondary-hover-bg); }
    .btn-sm { padding: 7px 14px; font-size: 13px; }

    .input, .select {
      width: 100%; padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font: inherit; transition: all var(--transition);
    }
    .input:focus, .select:focus {
      outline: none; border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(243,112,33,0.2);
    }
    .input::placeholder { color: var(--text-muted); }

    .live-metrics {
      display: flex; gap: 8px; padding: 10px 24px;
      background: linear-gradient(90deg, rgba(243,112,33,0.08), transparent);
      border-bottom: 1px solid var(--border-default);
      overflow-x: auto;
    }
    .metric {
      display: flex; flex-direction: column; align-items: center;
      min-width: 100px; padding: 10px 14px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-default);
    }
    .metric-label {
      font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px;
    }
    .metric-value { font-size: 20px; font-weight: 800; }

    .main {
      display: grid; grid-template-columns: 1fr 400px;
      gap: 20px; padding: 20px 24px; max-width: 1440px; margin: 0 auto;
    }
    @media (max-width: 1100px) { .main { grid-template-columns: 1fr; } }

    .upload-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 18px; background: var(--bg-card);
      border: 2px dashed var(--border-default);
      border-radius: var(--radius-md);
      cursor: pointer; transition: all var(--transition);
      margin-bottom: 16px;
    }
    .upload-bar:hover { border-color: var(--text-accent); background: rgba(243,112,33,0.05); }
    .upload-bar.loaded { border-style: solid; border-color: #18a900; background: rgba(24,169,0,0.08); }
    .upload-bar-icon { font-size: 24px; flex-shrink: 0; }
    .upload-bar-text { flex: 1; font-weight: 600; font-size: 14px; }
    .upload-bar-hint { font-size: 12px; color: var(--text-muted); }

    .tabs {
      display: flex; gap: 6px; padding: 4px;
      background: rgba(255,255,255,0.04); border-radius: var(--radius-lg);
      border: 1px solid var(--border-default); margin-bottom: 16px;
    }
    .tab {
      flex: 1; padding: 10px 14px; text-align: center;
      font-weight: 700; font-size: 14px; color: var(--text-secondary);
      border-radius: var(--radius-md); cursor: pointer; transition: all var(--transition);
      border: none; background: transparent;
    }
    .tab:hover { color: var(--text-primary); background: var(--btn-secondary-hover-bg); }
    .tab.active { background: var(--text-accent); color: white; box-shadow: 0 4px 12px rgba(243,112,33,0.3); }
    .tab.disabled { opacity: 0.3; pointer-events: none; cursor: not-allowed; }

    .panel { display: none; animation: fadeUp 0.2s ease; }
    .panel.active { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card {
      background: var(--bg-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border-default);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .card-icon {
      width: 30px; height: 30px; border-radius: 10px;
      display: grid; place-items: center;
      background: rgba(243,112,33,0.15); color: var(--text-accent);
      font-weight: 800; font-size: 14px;
    }
    .card-body { padding: 20px; }

    .segment-search { position: relative; margin-bottom: 16px; }
    .segment-search input { padding-left: 38px; }
    .segment-search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .segment-group { margin-bottom: 28px; }
    .segment-group:last-child { margin-bottom: 0; }
    .segment-group-header {
      display: flex; justify-content: space-between; padding: 4px 6px; margin-bottom: 10px;
    }
    .segment-group-title { font-weight: 700; font-size: 14px; color: var(--text-secondary); }
    .segment-group-count {
      font-size: 12px; color: var(--text-primary); font-weight: 700;
      background: rgba(255,255,255,0.08); padding: 3px 12px; border-radius: var(--radius-full);
    }
    .segment-list { display: grid; gap: 6px; }
    .segment-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-default);
      cursor: pointer; transition: all var(--transition);
    }
    .segment-item:hover { border-color: var(--text-accent); background: rgba(243,112,33,0.05); }
    .segment-item.active { background: rgba(243,112,33,0.12); border-color: var(--text-accent); }
    .segment-checkbox {
      width: 20px; height: 20px; border-radius: 6px;
      border: 2px solid rgba(255,255,255,0.25);
      display: grid; place-items: center; flex-shrink: 0;
    }
    .segment-item.active .segment-checkbox { background: var(--text-accent); border-color: var(--text-accent); }
    .segment-checkbox svg { width: 14px; height: 14px; color: white; opacity: 0; }
    .segment-item.active .segment-checkbox svg { opacity: 1; }
    .segment-name { flex: 1; font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .segment-count {
      font-size: 13px; color: var(--text-primary); font-weight: 700;
      padding: 3px 10px; background: rgba(255,255,255,0.08); border-radius: var(--radius-full);
    }

    .filter-rule {
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); padding: 16px; margin-bottom: 10px;
    }
    .filter-rule-header {
      display: flex; justify-content: space-between; margin-bottom: 10px;
    }
    .filter-fields-inline {
      display: flex; gap: 10px; align-items: end; flex-wrap: wrap;
    }
    .filter-fields-inline > div { flex: 1; min-width: 120px; }
    .filter-field-label {
      display: block; font-size: 11px; color: var(--text-muted);
      font-weight: 700; margin-bottom: 6px; text-transform: uppercase;
    }
    .date-range-row { display: flex; gap: 8px; align-items: center; }
    .date-range-row span { color: var(--text-muted); font-size: 14px; }

    .apply-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px; background: rgba(243,112,33,0.08);
      border: 1px solid rgba(243,112,33,0.3);
      border-radius: var(--radius-md); margin-top: 12px;
    }

    .priority-list { display: flex; flex-direction: column; gap: 8px; }
    .priority-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-default); border-radius: var(--radius-md);
      cursor: grab; transition: all var(--transition);
    }
    .priority-item:hover { border-color: var(--text-accent); }
    .priority-item.dragging { opacity: 0.8; transform: scale(1.02); box-shadow: var(--shadow-md); z-index: 10; }
    .priority-drag { color: var(--text-muted); cursor: grab; font-size: 18px; }
    .priority-field { flex: 1; font-weight: 600; }
    .priority-direction {
      padding: 6px 12px; background: rgba(255,255,255,0.05);
      border-radius: var(--radius-full); font-size: 12px; font-weight: 700;
      cursor: pointer;
    }
    .priority-direction:hover { background: var(--text-accent); color: white; }
    .priority-remove {
      width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border-default);
      display: grid; place-items: center; cursor: pointer;
      color: var(--text-muted); background: transparent;
    }
    .priority-remove:hover { color: var(--text-error); border-color: var(--text-error); }

    .employee-controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; gap: 16px; flex-wrap: wrap;
    }
    .cap-slider-wrap { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 200px; }
    .cap-slider {
      flex: 1; height: 6px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.1); border-radius: 99px; outline: none;
    }
    .cap-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
      background: var(--text-accent); cursor: pointer; border: 3px solid white;
    }
    .cap-value { font-weight: 800; font-size: 18px; min-width: 48px; text-align: center; }

    .employee-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 4px; }
    .employee-item {
      display: grid; grid-template-columns: 1fr auto auto auto;
      gap: 12px; align-items: center; padding: 12px 16px;
      border: 1px solid var(--border-default); border-radius: var(--radius-md);
    }
    .employee-item:nth-child(odd) { background: rgba(255,255,255,0.03); }
    .employee-item:nth-child(even) { background: rgba(243,112,33,0.04); }
    .employee-name { font-weight: 600; font-size: 14px; }
    .employee-found { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .employee-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 99px; overflow: hidden; margin-top: 6px; }
    .employee-bar-fill { height: 100%; background: linear-gradient(90deg, var(--text-accent), #d95c22); border-radius: 99px; }
    .employee-quota input {
      width: 72px; text-align: center; padding: 6px 8px; font-weight: 700;
      background: var(--bg-input); border: 1px solid var(--border-default);
      border-radius: 10px; color: var(--text-primary); font: inherit;
    }
    .employee-exclude {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      display: grid; place-items: center; cursor: pointer;
      color: var(--text-muted); border: 1px solid var(--border-default); background: transparent;
    }
    .employee-exclude:hover, .employee-exclude.active { color: var(--text-error); border-color: var(--text-error); }

    /* Дэшборд */
    .preview-panel { position: sticky; top: 76px; align-self: start; display: flex; flex-direction: column; gap: 16px; }
    .dash-card {
      background: var(--bg-card); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); overflow: hidden;
    }
    .dash-card-header {
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
      transition: background var(--transition);
    }
    .dash-card-header:hover { background: rgba(255,255,255,0.03); }
    .dash-card-body { padding: 0; }
    .chart-wrap { height: 200px; position: relative; }
    .chart-wrap-scroll { max-height: 300px; overflow-y: auto; }
    .mini-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .mini-table th {
      padding: 8px 10px; text-align: left; font-weight: 700; font-size: 10px;
      color: var(--text-muted); text-transform: uppercase;
      border-bottom: 1px solid var(--border-default);
      background: var(--bg-card);
      position: sticky; top: 0; z-index: 1;
    }
    .mini-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .mini-table tr:hover td { background: rgba(243,112,33,0.05); }
    .mini-table-wrap { max-height: 300px; overflow-y: auto; }

    /* Модальное окно */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px); z-index: 1000;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--bg-modal); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-modal);
      width: 90vw; max-width: 900px; max-height: 85vh;
      display: flex; flex-direction: column;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border-default);
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-close {
      width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border-default);
      display: grid; place-items: center; cursor: pointer;
      color: var(--text-muted); background: transparent; font-size: 18px;
    }
    .modal-close:hover { color: var(--text-error); border-color: var(--text-error); }
    .modal-body { padding: 0; overflow-y: auto; flex: 1; }
    /* Таблица в модалке — шапка НЕ sticky, скроллится вместе */
    .modal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .modal-table th {
      padding: 12px 14px; text-align: left; font-weight: 700; font-size: 11px;
      color: var(--text-muted); text-transform: uppercase;
      border-bottom: 1px solid var(--border-default);
      background: var(--bg-modal);
    }
    .modal-table td { padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }

    .export-checklist { display: flex; flex-direction: column; gap: 10px; margin: 12px 0; }
    .export-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-default); border-radius: var(--radius-md);
    }
    .export-check {
      width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border-default);
      display: grid; place-items: center; flex-shrink: 0;
    }
    .export-check.checked { background: #18a900; border-color: #18a900; }
    .export-check svg { width: 12px; height: 12px; color: white; opacity: 0; }
    .export-check.checked svg { opacity: 1; }
    .export-label { flex: 1; font-weight: 500; }
    .export-value { font-weight: 800; color: #18a900; }

    .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; max-width: 380px; }
    .toast {
      padding: 14px 18px; background: var(--bg-card-accent); border: 1px solid var(--border-default);
      border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
      display: flex; align-items: center; gap: 12px; animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    .toast.success { border-left: 4px solid #18a900; }
    .toast.warning { border-left: 4px solid #f59e0b; }
    .toast.error { border-left: 4px solid #ef4444; }

    .loading-overlay {
      position: fixed; inset: 0; background: rgba(15,10,9,0.9); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center; z-index: 2000;
    }
    .loading-overlay.active { display: flex; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border-default); border-top-color: var(--text-accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo"><span class="logo-dot"></span><span>Compas Flow</span></div>
    <div class="flex items-center gap-3">
      <button class="btn-ghost" id="btnReset">↺ Сбросить</button>
      <button class="btn-ghost" id="btnSave">💾 Сохранить</button>
      <button class="btn" id="btnExportTop" disabled>Экспорт</button>
    </div>
  </header>

  <div class="live-metrics">
    <div class="metric"><span class="metric-label">Всего</span><span class="metric-value" id="metricTotal">—</span></div>
    <div class="metric"><span class="metric-label">Сегменты</span><span class="metric-value" id="metricSegments">—</span></div>
    <div class="metric"><span class="metric-label">Фильтры</span><span class="metric-value" id="metricFilters">—</span></div>
    <div class="metric"><span class="metric-label">Итог</span><span class="metric-value" id="metricFinal">—</span></div>
    <div class="metric"><span class="metric-label">Сотрудники</span><span class="metric-value" id="metricEmployees">—</span></div>
  </div>

  <main class="main">
    <div class="workspace">
      <div class="upload-bar" id="uploadSection">
        <input type="file" id="fileInput" accept=".xlsx,.csv" style="display:none" />
        <span class="upload-bar-icon">📂</span>
        <span class="upload-bar-text">Перетащите файл или нажмите для выбора</span>
        <span class="upload-bar-hint">.xlsx / .csv</span>
      </div>
      
      <div class="tabs">
        <button class="tab active" data-tab="segments" disabled>🎯 Сегменты</button>
        <button class="tab" data-tab="filters" disabled>🔍 Фильтры</button>
        <button class="tab" data-tab="priority" disabled>⚡ Приоритет</button>
        <button class="tab" data-tab="employees" disabled>👥 Сотрудники</button>
      </div>
      
      <div class="panel active" id="panel-segments"></div>
      <div class="panel" id="panel-filters"></div>
      <div class="panel" id="panel-priority"></div>
      <div class="panel" id="panel-employees"></div>
    </div>
    
    <aside class="preview-panel">
      <div class="dash-card">
        <div class="dash-card-header" data-modal="segments">
          <span class="text-sm font-semibold">📊 Сегменты</span><span style="color:var(--text-muted);">⤢</span>
        </div>
        <div class="dash-card-body" style="padding:12px;"><div class="chart-wrap"><canvas id="segmentChart"></canvas></div></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-header" data-modal="employees">
          <span class="text-sm font-semibold">👥 Сотрудники</span><span style="color:var(--text-muted);">⤢</span>
        </div>
        <div class="dash-card-body" style="padding:12px;"><div class="chart-wrap-scroll"><div class="chart-wrap" id="employeeChartContainer"><canvas id="employeeChart"></canvas></div></div></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-header" data-modal="preview">
          <span class="text-sm font-semibold">👁️ Превью</span>
          <span class="text-xs text-muted" id="previewCount">0</span>
        </div>
        <div class="dash-card-body">
          <div class="mini-table-wrap">
            <table class="mini-table">
              <thead><tr><th>ФИО</th><th>Телефон</th><th>Сегмент</th><th>Сумма</th></tr></thead>
              <tbody id="previewMiniBody"></tbody>
            </table>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-body" style="padding:16px;">
          <div class="text-lg font-bold" style="margin-bottom:12px;">✅ Готово</div>
          <div class="export-checklist">
            <div class="export-item"><div class="export-check checked"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><span class="export-label">Телефонов</span><span class="export-value" id="expPhones">—</span></div>
            <div class="export-item"><div class="export-check checked"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><span class="export-label">Сотрудников</span><span class="export-value" id="expEmployees">—</span></div>
          </div>
          <button class="btn w-full" id="btnExport" disabled>🚀 Выгрузить .txt</button>
        </div>
      </div>
    </aside>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal"><div class="modal-header"><span class="font-semibold" id="modalTitle"></span><button class="modal-close" id="modalClose">✕</button></div><div class="modal-body" id="modalBody"></div></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

<script>
(function() {
  'use strict';
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);
  const state = {
    rawData: [], columns: [],
    segmentField: '', employeeField: '', phoneField: '',
    selectedSegments: new Set(),
    candidateRows: [], finalRows: [],
    employeeCap: 100, employees: [],
    loaded: false
  };
  const EMP_COLORS = ['#f37021','#d95c22','#8d5a4a','#f3a86b','#5a3d36','#ff8a4a'];

  function formatNum(n) { return n != null ? new Intl.NumberFormat('ru-RU').format(n) : '—'; }
  function esc(v) { return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function normDigits(v) { return String(v ?? '').replace(/\D/g, ''); }
  function getPanel(name) { return document.getElementById(`panel-${name}`); }

  function toast(msg, type='success') {
    const c = $('#toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<span>${type==='success'?'✓':type==='warning'?'!':'✕'}</span><span>${msg}</span>`;
    c.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),200); }, 2500);
  }
  function showLoading() { $('#loadingOverlay').classList.add('active'); }
  function hideLoading() { $('#loadingOverlay').classList.remove('active'); }

  function updateMetrics() {
    $('#metricTotal').textContent = formatNum(state.rawData.length);
    let afterSeg = state.segmentField && state.selectedSegments.size ? state.rawData.filter(r => state.selectedSegments.has(String(r[state.segmentField]??'').trim()||'—')).length : 0;
    $('#metricSegments').textContent = formatNum(afterSeg || state.rawData.length);
    $('#metricFilters').textContent = state.candidateRows.length ? formatNum(state.candidateRows.length) : '—';
    $('#metricFinal').textContent = state.finalRows.length ? formatNum(state.finalRows.length) : '—';
    $('#metricEmployees').textContent = state.employees.length ? `${state.employees.filter(e=>!e.excluded&&e.quota>0).length}/${state.employees.length}` : '—';
    const phones = new Set(state.finalRows.map(r => normDigits(r[state.phoneField])).filter(v => v.length>=10));
    $('#expPhones').textContent = phones.size ? formatNum(phones.size) : '—';
    $('#expEmployees').textContent = state.employees.filter(e=>!e.excluded&&e.quota>0).length || '—';
  }

  function findField(cands) {
    const n = s => String(s).toLowerCase().replace(/[\s_.,-]/g,'');
    for (const c of cands) { const f = state.columns.find(col => n(col)===n(c)); if (f) return f; }
    return '';
  }

  // ===== СЕГМЕНТЫ =====
  function buildSegments() {
    const field = state.segmentField;
    if (!field) return;
    const map = new Map();
    state.rawData.forEach(r => { const v = String(r[field]??'').trim()||'—'; map.set(v, (map.get(v)||0)+1); });
    const groups = new Map();
    [...map.entries()].forEach(([val, count]) => {
      const fw = val.split(/[\s_-]/)[0]||'—';
      if (!groups.has(fw)) groups.set(fw, []);
      groups.get(fw).push({val, count});
    });
    const sorted = [...groups.entries()].sort((a,b) => a[0].localeCompare(b[0],'ru'));
    state.selectedSegments = new Set([...map.keys()]);
    let html = '';
    sorted.forEach(([gname, items]) => {
      const total = items.reduce((s,i)=>s+i.count,0);
      html += `<div class="segment-group"><div class="segment-group-header"><div class="segment-group-title">${esc(gname)}</div><span class="segment-group-count">${formatNum(total)}</span></div><div class="segment-list">`;
      items.sort((a,b)=>a.val.localeCompare(b.val,'ru')).forEach(({val,count}) => {
        html += `<div class="segment-item active" data-seg="${esc(val)}"><div class="segment-checkbox"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><span class="segment-name">${esc(val)}</span><span class="segment-count">${count}</span></div>`;
      });
      html += '</div></div>';
    });
    getPanel('segments').innerHTML = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">1</div><div><div class="text-lg">Сегменты</div></div></div><div class="flex gap-2"><button class="btn-secondary btn-sm" id="btnSelectAll">Все</button><button class="btn-ghost btn-sm" id="btnClearAll">Снять</button></div></div><div class="card-body"><div class="segment-search"><span class="segment-search-icon">🔍</span><input class="input" id="segmentSearch" placeholder="Поиск..."></div><div id="segmentGroups">${html}</div></div></div>`;
    $$('.segment-item').forEach(item => item.addEventListener('click', () => {
      item.classList.toggle('active');
      const seg = item.dataset.seg;
      state.selectedSegments.has(seg) ? state.selectedSegments.delete(seg) : state.selectedSegments.add(seg);
      updateMetrics();
    }));
    $('#segmentSearch').addEventListener('input', e => {
      const t = e.target.value.toLowerCase();
      $$('.segment-item').forEach(item => item.style.display = item.dataset.seg.toLowerCase().includes(t) ? '' : 'none');
    });
    $('#btnSelectAll').addEventListener('click', () => {
      state.selectedSegments = new Set([...state.rawData.reduce((acc,r) => { acc.add(String(r[state.segmentField]??'').trim()||'—'); return acc; }, new Set())]);
      $$('.segment-item').forEach(item => item.classList.add('active'));
      updateMetrics();
    });
    $('#btnClearAll').addEventListener('click', () => {
      state.selectedSegments = new Set();
      $$('.segment-item').forEach(item => item.classList.remove('active'));
      updateMetrics();
    });
  }

  // ===== ФИЛЬТРЫ =====
  const FILTER_TYPES = {
    'Телефон': { op: 'value', type: 'text', placeholder: '7999...' },
    'Общ.сумма': { op: 'number', type: 'number', placeholder: 'Сумма' },
    'Посл.покупка': { op: 'date', type: 'date', placeholder: 'дд.мм.гггг' },
    'Сумма покупок за период': { op: 'number', type: 'number', placeholder: 'Сумма' },
    'Из них сумма Прямых продаж': { op: 'number', type: 'number', placeholder: 'Сумма' },
    'Кол-во штук товаров': { op: 'number', type: 'number', placeholder: 'Кол-во' },
    'Город': { op: 'value', type: 'text', placeholder: 'Москва' },
    'Дата коммуникации': { op: 'date', type: 'date', placeholder: 'дд.мм.гггг' },
    'ДР': { op: 'date', type: 'date', placeholder: 'дд.мм.гггг' },
  };
  const EXCLUDE_COLS = ['Номер карты','ФИО','Заметки'];

  let filterId = 0;
  function buildFiltersPanel() {
    const cols = state.columns.filter(c => !EXCLUDE_COLS.includes(c) && c !== state.segmentField && c !== state.employeeField);
    getPanel('filters').innerHTML = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">2</div><div class="text-lg">Условия</div></div></div><div class="card-body"><div style="margin-bottom:12px;"><button class="btn-secondary btn-sm" id="btnAddFilter">+ Добавить условие</button></div><div id="filterRules"></div><div class="apply-bar"><span class="text-sm text-muted">Фильтры необязательны</span><button class="btn btn-sm" id="btnApplyFilters">Применить</button></div></div></div>`;
    $('#btnAddFilter').addEventListener('click', () => {
      filterId++;
      const rule = document.createElement('div');
      rule.className = 'filter-rule';
      rule.innerHTML = `<div class="filter-rule-header"><span class="font-medium">Условие ${filterId}</span><button class="btn-ghost" data-remove>✕</button></div>
        <div class="filter-fields-inline">
          <div><label class="filter-field-label">Поле</label><select class="select filter-field">${cols.map(c=>`<option>${esc(c)}</option>`).join('')}</select></div>
          <div class="filter-op-container"><label class="filter-field-label">Условие</label><select class="select filter-op"></select></div>
          <div class="filter-val-container"><label class="filter-field-label">Значение</label><input class="input filter-value" placeholder="..."></div>
        </div>`;
      $('#filterRules').appendChild(rule);
      const fieldSel = rule.querySelector('.filter-field');
      const opSel = rule.querySelector('.filter-op');
      const valContainer = rule.querySelector('.filter-val-container');
      
      function updateUI() {
        const fname = fieldSel.value;
        const cfg = FILTER_TYPES[fname] || { op: 'value', type: 'text', placeholder: 'Значение' };
        opSel.innerHTML = '';
        if (cfg.op === 'value') {
          opSel.innerHTML = '<option value="value">Содержит</option>';
          valContainer.innerHTML = `<label class="filter-field-label">Значение</label><input class="input filter-value" placeholder="${cfg.placeholder}">`;
        } else if (cfg.op === 'number') {
          opSel.innerHTML = '<option value="gt">Больше</option><option value="gte">≥ Больше или равно</option><option value="lt">Меньше</option><option value="lte">≤ Меньше или равно</option><option value="eq">Равно</option>';
          valContainer.innerHTML = `<label class="filter-field-label">Значение</label><input type="number" class="input filter-value" placeholder="${cfg.placeholder}">`;
        } else if (cfg.op === 'date') {
          opSel.innerHTML = '<option value="date_eq">В дату</option><option value="date_after">После</option><option value="date_before">До</option><option value="date_range">Диапазон</option>';
          updateDateInput(valContainer, 'date_eq');
        }
      }
      function updateDateInput(container, op) {
        if (op === 'date_range') {
          container.innerHTML = `<label class="filter-field-label">Диапазон</label><div class="date-range-row"><input class="input filter-value-date1" placeholder="дд.мм.гггг"><span>—</span><input class="input filter-value-date2" placeholder="дд.мм.гггг"></div>`;
        } else {
          container.innerHTML = `<label class="filter-field-label">Дата</label><input class="input filter-value" placeholder="дд.мм.гггг">`;
        }
      }
      fieldSel.addEventListener('change', updateUI);
      opSel.addEventListener('change', () => {
        const cfg = FILTER_TYPES[fieldSel.value];
        if (cfg && cfg.op === 'date') updateDateInput(valContainer, opSel.value);
      });
      updateUI();
      rule.querySelectorAll('[data-remove]').forEach(btn => btn.addEventListener('click', () => rule.remove()));
    });
    
    $('#btnApplyFilters').addEventListener('click', () => {
      if (!state.selectedSegments.size) return toast('Выберите сегменты','warning');
      showLoading();
      setTimeout(() => {
        const filters = [];
        $$('.filter-rule').forEach(r => {
          const field = r.querySelector('.filter-field').value;
          const op = r.querySelector('.filter-op').value;
          const valEl = r.querySelector('.filter-value');
          const val = valEl ? valEl.value : '';
          if (val || op === 'date_range') {
            if (op === 'date_range') {
              const d1 = r.querySelector('.filter-value-date1')?.value || '';
              const d2 = r.querySelector('.filter-value-date2')?.value || '';
              if (d1 || d2) filters.push({ field, op, value: d1, value2: d2 });
            } else {
              filters.push({ field, op, value: val });
            }
          }
        });
        state.candidateRows = state.rawData.filter(row => {
          if (!state.selectedSegments.has(String(row[state.segmentField]??'').trim()||'—')) return false;
          return filters.every(f => matchFilter(row, f));
        });
        buildEmployeesPanel();
        hideLoading();
        toast(`Отобрано: ${formatNum(state.candidateRows.length)}`);
        updateMetrics(); updateCharts(); updatePreviewMini();
      }, 80);
    });
  }

  function parseDate(str) {
    if (!str) return null;
    const parts = str.split('.');
    if (parts.length === 3) return new Date(+parts[2], +parts[1]-1, +parts[0]);
    return new Date(str);
  }

  function matchFilter(row, f) {
    const raw = String(row[f.field] ?? '');
    const cfg = FILTER_TYPES[f.field];
    if (cfg && cfg.op === 'date') {
      const rowDate = parseDate(raw);
      if (!rowDate) return false;
      const fDate = parseDate(f.value);
      if (f.op === 'date_eq') return fDate && rowDate.toDateString() === fDate.toDateString();
      if (f.op === 'date_after') return fDate && rowDate >= fDate;
      if (f.op === 'date_before') return fDate && rowDate <= fDate;
      if (f.op === 'date_range') {
        const d1 = parseDate(f.value);
        const d2 = parseDate(f.value2);
        if (d1 && d2) return rowDate >= d1 && rowDate <= d2;
        if (d1) return rowDate >= d1;
        if (d2) return rowDate <= d2;
        return true;
      }
      return true;
    }
    if (f.op === 'value') return raw.toLowerCase().includes(String(f.value).toLowerCase());
    const num = parseFloat(raw.replace(/\s|,/g,'.'));
    const fnum = parseFloat(String(f.value).replace(/\s|,/g,'.'));
    if (isNaN(num) || isNaN(fnum)) return false;
    switch(f.op) {
      case 'gt': return num > fnum;
      case 'gte': return num >= fnum;
      case 'lt': return num < fnum;
      case 'lte': return num <= fnum;
      case 'eq': return num === fnum;
      default: return true;
    }
  }

  // ===== ПРИОРИТЕТ =====
  function buildPriorityPanel() {
    getPanel('priority').innerHTML = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">3</div><div class="text-lg">Приоритет</div></div><div class="flex gap-2"><button class="btn-secondary btn-sm" id="btnAddPriority">+ Поле</button></div></div><div class="card-body"><div class="priority-list" id="priorityList"><div class="text-muted" style="text-align:center;padding:24px;">Добавьте поля</div></div></div></div>`;
    $('#btnAddPriority').addEventListener('click', () => {
      const used = new Set([...$$('.priority-item')].map(el => el.dataset.field));
      const avail = state.columns.filter(c => !used.has(c) && c !== 'Номер карты' && c !== 'Заметки');
      if (!avail.length) return toast('Все поля добавлены','warning');
      renderPriority([...getCurrentPriority(), { field: avail[0], dir: 'desc' }]);
    });
  }

  function getCurrentPriority() {
    return [...$$('.priority-item')].map(el => ({ field: el.dataset.field, dir: el.dataset.dir }));
  }

  function renderPriority(items) {
    const list = $('#priorityList');
    if (!items.length) { list.innerHTML = '<div class="text-muted" style="text-align:center;padding:24px;">Добавьте поля</div>'; return; }
    list.innerHTML = items.map(i => `<div class="priority-item" draggable="true" data-field="${esc(i.field)}" data-dir="${i.dir}"><span class="priority-drag">⋮</span><span class="priority-field">${esc(i.field)}</span><span class="priority-direction">${i.dir==='desc'?'▼':i.dir==='asc'?'▲':'★'}</span><button class="priority-remove">✕</button></div>`).join('');
    list.querySelectorAll('.priority-direction').forEach(d => d.addEventListener('click', e => {
      e.stopPropagation();
      const next = d.dataset.dir === 'desc' ? 'asc' : d.dataset.dir === 'asc' ? 'custom' : 'desc';
      d.dataset.dir = next;
      d.textContent = next === 'desc' ? '▼' : next === 'asc' ? '▲' : '★';
      d.closest('.priority-item').dataset.dir = next;
    }));
    list.querySelectorAll('.priority-remove').forEach(btn => btn.addEventListener('click', e => {
      e.stopPropagation();
      btn.closest('.priority-item').remove();
      if (!list.children.length) list.innerHTML = '<div class="text-muted" style="text-align:center;padding:24px;">Добавьте поля</div>';
    }));
    let dragEl = null;
    list.querySelectorAll('.priority-item').forEach(item => {
      item.addEventListener('dragstart', e => { dragEl = item; item.classList.add('dragging'); });
      item.addEventListener('dragend', () => { item.classList.remove('dragging'); dragEl = null; });
      item.addEventListener('dragover', e => {
        e.preventDefault();
        if (!dragEl || dragEl === item) return;
        const rect = item.getBoundingClientRect();
        e.clientY < rect.top + rect.height/2 ? item.parentNode.insertBefore(dragEl, item) : item.parentNode.insertBefore(dragEl, item.nextSibling);
      });
    });
  }

  // ===== СОТРУДНИКИ =====
  function buildEmployeesPanel() {
    if (!state.candidateRows.length) {
      getPanel('employees').innerHTML = `<div class="card"><div class="card-body"><div class="text-muted" style="text-align:center;padding:24px;">Примените фильтры</div></div></div>`;
      return;
    }
    const map = new Map();
    state.candidateRows.forEach(r => {
      const n = String(r[state.employeeField]??'').trim()||'—';
      if (!map.has(n)) map.set(n, []);
      map.get(n).push(r);
    });
    state.employees = [...map.entries()].map(([n,rows]) => ({ name: n, found: rows.length, quota: Math.min(rows.length, state.employeeCap), excluded: false })).sort((a,b) => a.name.localeCompare(b.name,'ru'));
    renderEmployeesPanel();
    updateMetrics();
  }

  function renderEmployeesPanel() {
    const cap = state.employeeCap;
    getPanel('employees').innerHTML = `<div class="card"><div class="card-header"><div class="card-title"><div class="card-icon">4</div><div class="text-lg">Распределение</div></div></div><div class="card-body"><div class="employee-controls"><div class="cap-slider-wrap"><span class="text-sm">Лимит:</span><input type="range" min="10" max="500" value="${cap}" id="capSlider" class="cap-slider"><span class="cap-value">${cap}</span></div><div class="flex gap-2"><button class="btn-secondary btn-sm" id="btnEqual">⚖️ Поровну</button><button class="btn-secondary btn-sm" id="btnFill">🎯 Заполнить</button></div></div><div class="employee-list">${state.employees.map((emp,i) => {
      const pct = Math.min(100, Math.round((emp.quota/emp.found)*100));
      return `<div class="employee-item" data-idx="${i}"><div><div class="employee-name">${esc(emp.name)}</div><div class="employee-found">${formatNum(emp.found)}</div><div class="employee-bar"><div class="employee-bar-fill" style="width:${pct}%"></div></div></div><div class="font-semibold">${emp.quota}</div><div class="employee-quota"><input type="number" value="${Math.min(emp.found,cap)}" min="0" max="${emp.found}" ${emp.excluded?'disabled':''}></div><button class="employee-exclude ${emp.excluded?'active':''}">✕</button></div>`;
    }).join('')}</div><div class="apply-bar" style="margin-top:12px;"><span class="text-sm text-muted">Настройте квоты</span><button class="btn btn-sm" id="btnApplyEmployees">Применить</button></div></div></div>`;
    
    // Слайдер лимита
    const slider = $('#capSlider');
    const capVal = $('#capValue');
    slider.addEventListener('input', () => {
      state.employeeCap = +slider.value;
      capVal.textContent = state.employeeCap;
      // Мгновенно обновляем квоты
      state.employees.forEach(e => { if (!e.excluded) e.quota = Math.min(e.found, state.employeeCap); });
      // Перерисовываем DOM
      refreshEmployeeDOM();
    });
    
    function refreshEmployeeDOM() {
      const list = $('.employee-list');
      if (!list) return;
      const items = list.querySelectorAll('.employee-item');
      items.forEach(item => {
        const idx = +item.dataset.idx;
        const emp = state.employees[idx];
        const inp = item.querySelector('input');
        const bar = item.querySelector('.employee-bar-fill');
        const lbl = item.querySelector('.font-semibold');
        const newVal = Math.min(emp.found, state.employeeCap);
        if (!emp.excluded) {
          emp.quota = newVal;
          inp.value = newVal;
          inp.max = emp.found;
          bar.style.width = Math.min(100, Math.round((newVal/emp.found)*100))+'%';
          lbl.textContent = newVal;
        }
      });
    }
    
    $('#btnEqual').addEventListener('click', () => {
      const active = state.employees.filter(e => !e.excluded);
      if (!active.length) return;
      const per = Math.min(state.employeeCap, Math.floor(state.candidateRows.length / active.length));
      active.forEach(e => e.quota = Math.min(e.found, per));
      refreshEmployeeDOM();
    });
    $('#btnFill').addEventListener('click', () => {
      state.employees.forEach(e => { if (!e.excluded) e.quota = Math.min(e.found, state.employeeCap); });
      refreshEmployeeDOM();
    });
    
    // Обработчики инпутов и кнопок исключения
    $$('.employee-item').forEach(item => {
      const idx = +item.dataset.idx;
      const inp = item.querySelector('input');
      const ex = item.querySelector('.employee-exclude');
      inp.addEventListener('change', () => {
        let v = Math.max(0, Math.min(+inp.value||0, state.employees[idx].found, state.employeeCap));
        inp.value = v; state.employees[idx].quota = v;
        item.querySelector('.employee-bar-fill').style.width = Math.min(100, Math.round((v/state.employees[idx].found)*100))+'%';
        item.querySelector('.font-semibold').textContent = v;
      });
      ex.addEventListener('click', () => {
        state.employees[idx].excluded = !state.employees[idx].excluded;
        ex.classList.toggle('active');
        if (state.employees[idx].excluded) {
          inp.value = 0; inp.disabled = true; state.employees[idx].quota = 0;
          item.querySelector('.employee-bar-fill').style.width = '0%';
          item.querySelector('.font-semibold').textContent = '0';
        } else {
          inp.disabled = false; inp.value = Math.min(state.employees[idx].found, state.employeeCap);
          state.employees[idx].quota = Math.min(state.employees[idx].found, state.employeeCap);
          inp.dispatchEvent(new Event('change'));
        }
      });
    });
    
    $('#btnApplyEmployees').addEventListener('click', () => {
      showLoading();
      setTimeout(() => {
        const groups = new Map();
        state.candidateRows.forEach(r => {
          const n = String(r[state.employeeField]??'').trim()||'—';
          if (!groups.has(n)) groups.set(n, []);
          groups.get(n).push(r);
        });
        state.finalRows = [];
        state.employees.forEach(emp => {
          if (emp.excluded || emp.quota <= 0) return;
          state.finalRows.push(...(groups.get(emp.name)||[]).slice(0, emp.quota));
        });
        hideLoading();
        toast(`Итог: ${formatNum(state.finalRows.length)}`);
        updateMetrics(); updateCharts(); updatePreviewMini();
        $('#btnExport').disabled = !state.finalRows.length;
        $('#btnExportTop').disabled = !state.finalRows.length;
      }, 80);
    });
  }

  // ===== ПРЕВЬЮ (ВСЕ СТРОКИ) =====
  function updatePreviewMini() {
    const rows = state.finalRows.length ? state.finalRows : state.candidateRows;
    const tbody = $('#previewMiniBody');
    $('#previewCount').textContent = formatNum(rows.length);
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:18px;">Нет данных</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map(r => {
      const p = normDigits(r[state.phoneField]);
      const fmt = p.length >= 10 ? `+${p[0]} (${p.slice(1,4)}) ${p.slice(4,7)}-${p.slice(7,9)}-${p.slice(9,11)}` : p;
      return `<tr><td>${esc(r['ФИО']||r['Имя']||'—')}</td><td>${fmt}</td><td>${esc(r[state.segmentField]||'—')}</td><td>${esc(r['Общ.сумма']||'—')}</td></tr>`;
    }).join('');
  }

  // ===== МОДАЛЬНЫЕ ОКНА =====
  function openModal(title, content) {
    $('#modalTitle').textContent = title;
    $('#modalBody').innerHTML = content;
    $('#modalOverlay').classList.add('active');
  }
  $('#modalClose').addEventListener('click', () => $('#modalOverlay').classList.remove('active'));
  $('#modalOverlay').addEventListener('click', e => { if (e.target === $('#modalOverlay')) $('#modalOverlay').classList.remove('active'); });

  $$('.dash-card-header[data-modal]').forEach(header => {
    header.addEventListener('click', () => {
      const type = header.dataset.modal;
      if (type === 'segments') {
        openModal('📊 Сегменты', '<div class="chart-wrap" style="height:420px;"><canvas id="modalSegmentChart"></canvas></div>');
        setTimeout(() => {
          const ctx = $('#modalSegmentChart')?.getContext('2d');
          if (!ctx) return;
          const data = makeChartData(state.candidateRows.length ? state.candidateRows : state.rawData, state.segmentField, 8);
          new Chart(ctx, {
            type: 'doughnut',
            data: { labels: data.labels, datasets: [{ data: data.values, backgroundColor: ['#f37021','#ff8a4a','#f3a86b','#d95c22','#8d5a4a','#5a3d36','#f58d4d','#c44d1a'], borderWidth: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#aaa' } } }, cutout: '50%' }
          });
        }, 100);
      } else if (type === 'employees') {
        openModal('👥 Сотрудники', '<div class="chart-wrap-scroll"><div class="chart-wrap" id="modalEmployeeChartContainer" style="height:auto;min-height:300px;"><canvas id="modalEmployeeChart"></canvas></div></div>');
        setTimeout(() => {
          const ctx = $('#modalEmployeeChart')?.getContext('2d');
          const container = $('#modalEmployeeChartContainer');
          if (!ctx || !container) return;
          const eBase = state.finalRows.length ? state.finalRows : state.candidateRows;
          const eData = makeEmployeeData(eBase, state.employeeField);
          container.style.height = Math.max(300, eData.labels.length * 35 + 50) + 'px';
          new Chart(ctx, {
            type: 'bar',
            data: { labels: eData.labels, datasets: [{ data: eData.values, backgroundColor: eData.labels.map((_,i) => EMP_COLORS[i%EMP_COLORS.length]), borderRadius: 6, maxBarThickness: 22 }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.06)' } }, y: { ticks: { color: '#fff', font: { size: 11 } }, grid: { display: false } } } }
          });
        }, 100);
      } else if (type === 'preview') {
        const rows = state.finalRows.length ? state.finalRows : state.candidateRows;
        let tbody = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:24px;">Нет данных</td></tr>';
        if (rows.length) {
          tbody = rows.map(r => {
            const p = normDigits(r[state.phoneField]);
            const fmt = p.length >= 10 ? `+${p[0]} (${p.slice(1,4)}) ${p.slice(4,7)}-${p.slice(7,9)}-${p.slice(9,11)}` : p;
            return `<tr><td>${esc(r['ФИО']||r['Имя']||'—')}</td><td>${fmt}</td><td>${esc(r[state.segmentField]||'—')}</td><td>${esc(r['Общ.сумма']||'—')}</td></tr>`;
          }).join('');
        }
        // Шапка не sticky — скроллится вместе
        openModal(`👁️ Превью (${formatNum(rows.length)} строк)`, `<table class="modal-table"><thead><tr><th>ФИО</th><th>Телефон</th><th>Сегмент</th><th>Сумма</th></tr></thead><tbody>${tbody}</tbody></table>`);
      }
    });
  });

  // ===== ЧАРТЫ =====
  let charts = { segment: null, employee: null };
  function updateCharts() {
    const sData = makeChartData(state.candidateRows.length ? state.candidateRows : state.rawData, state.segmentField, 6);
    if (charts.segment) charts.segment.destroy();
    charts.segment = new Chart($('#segmentChart').getContext('2d'), {
      type: 'doughnut',
      data: { labels: sData.labels, datasets: [{ data: sData.values, backgroundColor: ['#f37021','#ff8a4a','#f3a86b','#d95c22','#8d5a4a','#5a3d36'], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { color: '#aaa', font: { size: 10 } } } }, cutout: '60%' }
    });
    const eBase = state.finalRows.length ? state.finalRows : state.candidateRows;
    const eData = makeEmployeeData(eBase, state.employeeField);
    const container = $('#employeeChartContainer');
    container.style.height = Math.max(180, eData.labels.length * 28 + 40) + 'px';
    if (charts.employee) charts.employee.destroy();
    charts.employee = new Chart($('#employeeChart').getContext('2d'), {
      type: 'bar',
      data: { labels: eData.labels, datasets: [{ data: eData.values, backgroundColor: eData.labels.map((_,i) => EMP_COLORS[i%EMP_COLORS.length]), borderRadius: 4, maxBarThickness: 18 }] },
      options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#aaa' }, grid: { color: 'rgba(255,255,255,0.06)' } }, y: { ticks: { color: '#fff', font: { size: 10 } }, grid: { display: false } } } }
    });
  }

  function makeChartData(rows, field, topN) {
    const map = new Map();
    rows.forEach(r => { const k = String(r[field]??'').trim()||'—'; map.set(k, (map.get(k)||0)+1); });
    const sorted = [...map.entries()].sort((a,b) => b[1]-a[1]);
    const top = sorted.slice(0, topN); const other = sorted.slice(topN).reduce((s,[,v])=>s+v,0);
    const labels = top.map(x=>x[0]); const values = top.map(x=>x[1]);
    if (other > 0) { labels.push('Прочее'); values.push(other); }
    return { labels, values };
  }

  function makeEmployeeData(rows, field) {
    const map = new Map();
    rows.forEach(r => { const k = String(r[field]??'').trim()||'—'; map.set(k, (map.get(k)||0)+1); });
    const sorted = [...map.entries()].sort((a,b) => b[1]-a[1]);
    return { labels: sorted.map(x=>x[0]), values: sorted.map(x=>x[1]) };
  }

  // ===== ФАЙЛ =====
  const uploadSection = $('#uploadSection');
  const fileInput = $('#fileInput');
  uploadSection.addEventListener('click', () => fileInput.click());
  uploadSection.addEventListener('dragover', e => { e.preventDefault(); uploadSection.style.borderColor = 'var(--text-accent)'; });
  uploadSection.addEventListener('dragleave', () => { uploadSection.style.borderColor = ''; });
  uploadSection.addEventListener('drop', e => { e.preventDefault(); uploadSection.style.borderColor = ''; if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  function handleFile(file) {
    showLoading();
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        let wb = /\.csv$/i.test(file.name) ? XLSX.read(evt.target.result, { type: 'string' }) : XLSX.read(evt.target.result, { type: 'array' });
        let rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
        state.rawData = rows;
        state.columns = Object.keys(rows[0] || {});
        state.segmentField = findField(['Категория','Category','Segment','Сегмент']);
        state.employeeField = findField(['Сотрудник','Employee','Менеджер','Manager']);
        state.phoneField = findField(['Телефон','Phone','Tel','Мобильный']);
        if (!state.segmentField || !state.employeeField || !state.phoneField) {
          hideLoading();
          toast(`Не найдены поля. Колонки: ${state.columns.join(', ')}`, 'error');
          return;
        }
        state.loaded = true;
        uploadSection.classList.add('loaded');
        uploadSection.querySelector('.upload-bar-text').textContent = `✅ ${file.name}`;
        uploadSection.querySelector('.upload-bar-hint').textContent = `${formatNum(rows.length)} строк`;
        buildSegments();
        buildFiltersPanel();
        buildPriorityPanel();
        getPanel('employees').innerHTML = `<div class="card"><div class="card-body"><div class="text-muted" style="text-align:center;padding:24px;">Примените фильтры</div></div></div>`;
        $$('.tab').forEach(t => { t.classList.remove('disabled'); t.disabled = false; });
        hideLoading();
        toast(`Загружено: ${rows.length} строк`);
        updateMetrics(); updateCharts(); updatePreviewMini();
      } catch (err) { hideLoading(); toast(`Ошибка: ${err.message}`, 'error'); }
    };
    if (/\.csv$/i.test(file.name)) reader.readAsText(file, 'utf-8');
    else reader.readAsArrayBuffer(file);
  }

  function initTabs() {
    const tabs = $$('.tab');
    const panels = $$('.panel');
    tabs.forEach(tab => {
      tab.addEventListener('click', function() {
        if (this.classList.contains('disabled') || this.disabled) return;
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        this.classList.add('active');
        const panel = document.getElementById(`panel-${this.getAttribute('data-tab')}`);
        if (panel) panel.classList.add('active');
      });
    });
  }

  document.querySelectorAll('#btnExport, #btnExportTop').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!state.finalRows.length) return toast('Соберите итог','warning');
      const phones = [...new Set(state.finalRows.map(r => normDigits(r[state.phoneField])).filter(v => v.length>=10))];
      const blob = new Blob([phones.join('\n')], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = `compas_${new Date().toISOString().slice(0,10)}.txt`; a.click();
      URL.revokeObjectURL(a.href);
      toast(`Готово: ${formatNum(phones.length)} номеров`);
    });
  });

  $('#btnSave').addEventListener('click', () => {
    localStorage.setItem('compas_cfg', JSON.stringify({ selected: [...state.selectedSegments], cap: state.employeeCap, time: Date.now() }));
    toast('Сохранено');
  });

  $('#btnReset').addEventListener('click', () => {
    if (!confirm('Сбросить всё?')) return;
    state.rawData = []; state.candidateRows = []; state.finalRows = []; state.selectedSegments = new Set(); state.employees = []; state.loaded = false;
    uploadSection.classList.remove('loaded');
    uploadSection.querySelector('.upload-bar-text').textContent = 'Перетащите файл';
    uploadSection.querySelector('.upload-bar-hint').textContent = '.xlsx / .csv';
    getPanel('segments').innerHTML = '<div class="card"><div class="card-body"><div class="text-muted" style="text-align:center;padding:24px;">Загрузите файл</div></div></div>';
    getPanel('filters').innerHTML = '';
    getPanel('priority').innerHTML = '';
    getPanel('employees').innerHTML = '';
    $$('.tab').forEach((t,i) => { t.classList.remove('active'); if (i===0) t.classList.add('active'); t.classList.add('disabled'); t.disabled = true; });
    $$('.panel').forEach(p => p.classList.remove('active'));
    getPanel('segments').classList.add('active');
    $('#btnExport').disabled = true; $('#btnExportTop').disabled = true;
    ['metricTotal','metricSegments','metricFilters','metricFinal','metricEmployees'].forEach(id => $('#'+id).textContent = '—');
    $('#expPhones').textContent = '—'; $('#expEmployees').textContent = '—';
    $('#previewMiniBody').innerHTML = ''; $('#previewCount').textContent = '0';
    updateCharts();
    toast('Сброшено', 'warning');
  });

  initTabs();
  updateCharts();
})();
</script>
</body>
</html>
