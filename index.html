<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Compas Операционный Центр</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#2f2623;
  color:#fff;
  padding:16px;
}

h2{margin:10px 0;}

.panel{
  background:rgba(255,255,255,0.04);
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
}

button{
  background:#ef6f2e;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  margin:4px 0;
}

input{
  padding:6px;
  border-radius:8px;
  border:1px solid #444;
  background:#3a2f2b;
  color:#fff;
}

.checkbox-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

td,th{
  border:1px solid #444;
  padding:4px;
}

th{
  background:#ef6f2e;
}
</style>
</head>

<body>

<h2>⚙️ COMPAS ОПЕРАЦИОННЫЙ ЦЕНТР</h2>

<div class="panel">
<input type="file" id="fileInput">
</div>

<!-- СЕГМЕНТЫ -->
<div class="panel">
<h3>📊 Сегменты</h3>
<div id="segments" class="checkbox-grid"></div>
<button onclick="applySegments()">Применить сегменты</button>
</div>

<!-- РАСПРЕДЕЛЕНИЕ -->
<div class="panel">
<h3>👥 Сотрудники</h3>
<div id="staff"></div>
<button onclick="distribute()">⚡ Распределить задачи</button>
</div>

<!-- ВЫГРУЗКА -->
<div class="panel">
<h3>📲 Compas выгрузка</h3>
<button onclick="exportPhones()">Скачать телефоны (.txt)</button>
</div>

<div id="preview"></div>

<script>

let data = [];
let filtered = [];

let PHONE_FIELD = null;
let EMPLOYEE_FIELD = null;
let SEGMENT_FIELD = null;

// ================= СЕГМЕНТЫ =================
const SEGMENTS = [
"none",
"Без анкеты",
"Искра_Корпоративные",
"Искра_Ушедшие",
"Искра_Спящие",
"Искра_Активные",
"Новички_Корпоративные",
"Новички_Ушедшие",
"Новички_Спящие",
"Новички_Активные",
"Знакомые_Корпоративные",
"Знакомые_Ушедшие",
"Знакомые_Спящие",
"Знакомые_Активные",
"Друзья_Корпоративные",
"Друзья_Ушедшие",
"Друзья_Спящие",
"Друзья_Активные",
"Семья_Корпоративные",
"Семья_Ушедшие",
"Семья_Спящие",
"Семья_Активные",
"VIC_Корпоративные",
"VIC_Ушедшие",
"VIC_Спящие",
"VIC_Активные"
];

// ================= ЗАГРУЗКА =================
fileInput.onchange = async (e)=>{

  const file = e.target.files[0];
  const buf = await file.arrayBuffer();

  const wb = XLSX.read(buf,{type:'array'});
  const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

  data = json;

  const keys = Object.keys(data[0] || {});

  PHONE_FIELD = keys.find(k =>
    k.toLowerCase().includes("тел") ||
    k.toLowerCase().includes("phone")
  );

  EMPLOYEE_FIELD = keys.find(k =>
    k.toLowerCase().includes("сотрудник")
  );

  SEGMENT_FIELD = keys.find(k =>
    k.toLowerCase().includes("сегмент")
  );

  buildSegments();
  buildStaff();

  render(data);
};

// ================= СЕГМЕНТЫ UI =================
function buildSegments(){

  segments.innerHTML = SEGMENTS.map(s=>`
    <label>
      <input type="checkbox" value="${s}">
      ${s}
    </label>
  `).join('');
}

// ================= СОТРУДНИКИ =================
function buildStaff(){

  if(!EMPLOYEE_FIELD) return;

  let map = {};

  data.forEach(r=>{
    let s = r[EMPLOYEE_FIELD] || "—";
    map[s] = (map[s] || 0) + 1;
  });

  staff.innerHTML = Object.entries(map).map(([k,v])=>`
    <div>
      ${k} (${v})
      <input type="number" value="${v}" data-s="${k}">
    </div>
  `).join('');
}

// ================= СЕГМЕНТЫ =================
function applySegments(){

  const selected = [...document.querySelectorAll('#segments input:checked')]
    .map(i=>i.value);

  if(selected.length === 0 || selected.includes("none")){
    filtered = [...data];
    render(filtered);
    return;
  }

  filtered = data.filter(r =>
    selected.includes(r[SEGMENT_FIELD])
  );

  render(filtered);
}

// ================= РАСПРЕДЕЛЕНИЕ =================
function distribute(){

  if(!EMPLOYEE_FIELD) return;

  const inputs = document.querySelectorAll('#staff input');

  let limits = {};
  inputs.forEach(i=>{
    limits[i.dataset.s] = +i.value;
  });

  let counters = {};
  Object.keys(limits).forEach(s=>counters[s]=0);

  const staff = Object.keys(limits);

  let i = 0;

  filtered.forEach(r=>{

    let tries = 0;

    while(tries < staff.length){

      let s = staff[i];

      if(counters[s] < limits[s]){

        r[EMPLOYEE_FIELD] = s;
        counters[s]++;

        i = (i+1) % staff.length;
        break;
      }

      i = (i+1) % staff.length;
      tries++;
    }

  });

  render(filtered);
}

// ================= ВЫГРУЗКА =================
function exportPhones(){

  if(!PHONE_FIELD){
    alert("Поле телефона не найдено");
    return;
  }

  const phones = filtered
    .map(r => String(r[PHONE_FIELD] || "").replace(/\D/g,''))
    .filter(v => v.length >= 10);

  const unique = [...new Set(phones)];

  if(unique.length === 0){
    alert("Нет номеров для выгрузки");
    return;
  }

  const blob = new Blob([unique.join("\n")], {type:"text/plain"});

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "compas_phones.txt";
  a.click();
}

// ================= RENDER =================
function render(rows){

  if(!rows.length){
    preview.innerHTML = "<p>Нет данных</p>";
    return;
  }

  const keys = Object.keys(rows[0]);

  let html = "<table><tr>" +
    keys.map(k=>`<th>${k}</th>`).join("") +
    "</tr>";

  rows.slice(0,100).forEach(r=>{
    html += "<tr>" +
      keys.map(k=>`<td>${r[k] ?? ""}</td>`).join("") +
      "</tr>";
  });

  html += "</table>";

  preview.innerHTML = html;
}

</script>

</body>
</html>
