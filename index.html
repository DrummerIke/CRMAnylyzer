<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Операционный центр отбора</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#2f2725;
  color:#fff;
  padding:20px;
}
.card{
  background:#3b322f;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
h2{margin:0 0 10px}
button{
  background:#ef6f2e;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  color:#fff;
  cursor:pointer;
}
input,select{
  padding:8px;
  border-radius:6px;
  border:none;
  width:100%;
}
.row{display:flex;gap:10px;margin-bottom:8px}
table{
  width:100%;
  border-collapse:collapse;
}
td,th{
  padding:6px;
  border-bottom:1px solid #555;
}
</style>
</head>

<body>

<div class="card">
<h2>1. Загрузка файла</h2>
<input type="file" id="file">
<div id="status"></div>
</div>

<div class="card">
<h2>2. Сегменты</h2>
<div id="segments"></div>
</div>

<div class="card">
<h2>3. Условия</h2>
<div id="conditions"></div>
<button onclick="addCondition()">+ условие</button>
</div>

<div class="card">
<h2>4. Приоритет</h2>
<div id="priority"></div>
<button onclick="addPriority()">+ критерий</button>
</div>

<div class="card">
<h2>5. Сотрудники</h2>
Лимит на всех: <input id="globalLimit" type="number" value="100">
<table>
<thead>
<tr>
<th>Сотрудник</th>
<th>Найдено</th>
<th>Взять</th>
<th>Искл</th>
</tr>
</thead>
<tbody id="employees"></tbody>
</table>
</div>

<div class="card">
<button onclick="calculate()">Посчитать</button>
<button onclick="finalSelect()">Собрать</button>
<button onclick="download()">Скачать телефоны</button>
</div>

<div class="card">
<h2>Превью</h2>
<div id="preview"></div>
</div>

<script>
let data = [];
let columns = [];
let types = {};
let finalRows = [];

document.getElementById('file').onchange = e=>{
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = evt=>{
    const wb = XLSX.read(evt.target.result,{type:'binary'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    data = XLSX.utils.sheet_to_json(ws);

    columns = Object.keys(data[0]);

    detectTypes();
    loadSegments();
    fillSelects();

    document.getElementById('status').innerText = "Файл загружен";
  };

  reader.readAsBinaryString(file);
};

function detectTypes(){
  columns.forEach(c=>{
    let nums=0,dates=0;

    data.slice(0,50).forEach(r=>{
      const v=r[c];
      if(!v)return;

      if(!isNaN(parseFloat(v))) nums++;

      if(String(v).match(/\d{2}\.\d{2}\.\d{4}/) || (v>30000 && v<60000))
        dates++;
    });

    if(dates>20) types[c]="date";
    else if(nums>30) types[c]="number";
    else types[c]="text";
  });
}

function loadSegments(){
  const set = new Set(data.map(r=>r["Категория"]));
  let arr = [...set].filter(Boolean);

  arr.sort((a,b)=>{
    if(a.startsWith("VIC")) return -1;
    return a.localeCompare(b,'ru');
  });

  const div = document.getElementById('segments');
  div.innerHTML='';

  arr.forEach(s=>{
    div.innerHTML += `<label><input type="checkbox" value="${s}"> ${s}</label><br>`;
  });
}

function addCondition(){
  const div = document.getElementById('conditions');

  let html = `
  <div class="row">
    <select class="col">${columns.map(c=>`<option>${c}</option>`)}</select>
    <select class="op">
      <option>=</option>
      <option>></option>
      <option><</option>
      <option>contains</option>
    </select>
    <input class="val">
  </div>`;

  div.innerHTML += html;
}

function addPriority(){
  const div = document.getElementById('priority');

  div.innerHTML += `
  <div class="row">
    <select class="pcol">${columns.map(c=>`<option>${c}</option>`)}</select>
    <select class="pdir">
      <option value="desc">↓</option>
      <option value="asc">↑</option>
    </select>
  </div>`;
}

function applyFilters(){
  let res = [...data];

  // сегменты
  const segs = [...document.querySelectorAll('#segments input:checked')]
    .map(x=>x.value);

  if(segs.length){
    res = res.filter(r=>segs.includes(r["Категория"]));
  }

  // условия
  document.querySelectorAll('#conditions .row').forEach(r=>{
    const col=r.querySelector('.col').value;
    const op=r.querySelector('.op').value;
    const val=r.querySelector('.val').value;

    res = res.filter(row=>{
      const v=row[col];

      if(types[col]==="number"){
        return op===">"?v>val:op==="<"?v<val:v==val;
      }
      else{
        return String(v).includes(val);
      }
    });
  });

  return res;
}

function calculate(){
  const res = applyFilters();

  const map = {};

  res.forEach(r=>{
    const emp = r["Сотрудник"];
    map[emp] = (map[emp]||0)+1;
  });

  const tbody = document.getElementById('employees');
  tbody.innerHTML='';

  Object.entries(map).forEach(([k,v])=>{
    tbody.innerHTML += `
    <tr>
      <td>${k}</td>
      <td>${v}</td>
      <td><input value="${Math.min(v,100)}" data-name="${k}"></td>
      <td><input type="checkbox" data-ex="${k}"></td>
    </tr>`;
  });
}

function finalSelect(){
  let res = applyFilters();

  // сортировка
  document.querySelectorAll('#priority .row').forEach(r=>{
    const col=r.querySelector('.pcol').value;
    const dir=r.querySelector('.pdir').value;

    res.sort((a,b)=>{
      return dir==="desc"?b[col]-a[col]:a[col]-b[col];
    });
  });

  const limits={};
  document.querySelectorAll('#employees input').forEach(i=>{
    if(i.dataset.name)
      limits[i.dataset.name]=parseInt(i.value);
  });

  const excl={};
  document.querySelectorAll('[data-ex]').forEach(i=>{
    if(i.checked) excl[i.dataset.ex]=true;
  });

  const grouped={};
  finalRows=[];

  res.forEach(r=>{
    const emp=r["Сотрудник"];

    if(excl[emp]) return;

    grouped[emp]=grouped[emp]||0;

    if(grouped[emp]<(limits[emp]||0)){
      grouped[emp]++;
      finalRows.push(r);
    }
  });

  renderPreview();
}

function renderPreview(){
  const div = document.getElementById('preview');

  div.innerHTML = finalRows.slice(0,50).map(r=>r["Телефон"]).join("<br>");
}

function download(){
  const phones = finalRows.map(r=>r["Телефон"]).filter(Boolean);

  const blob = new Blob([phones.join("\n")]);
  const a=document.createElement('a');

  a.href=URL.createObjectURL(blob);
  a.download="phones.txt";
  a.click();
}
</script>

</body>
</html>
